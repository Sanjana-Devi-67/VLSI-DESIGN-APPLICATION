version: '3.8'

services:
  # NextJS Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Main API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Maps local port 8001 to container's 8000, 
      # since frontend code expects http://localhost:8001/
      - "8001:8000"
    depends_on:
      - ai-engine
      - vlsi-tools
    environment:
      - AI_ENGINE_URL=http://ai-engine:8001
      - VLSI_TOOLS_URL=http://vlsi-tools:8002

  # AI Engine Service
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8001" 

  # VLSI Simulation Tools Service
  vlsi-tools:
    build:
      context: ./vlsi-tools
      dockerfile: Dockerfile
    ports:
      - "8003:8002"
