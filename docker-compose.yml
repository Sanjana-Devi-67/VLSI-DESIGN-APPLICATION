version: '3.8'

services:
  db:
    image: postgres:15
    container_name: qantyx_postgres
    restart: always
    environment:
      POSTGRES_USER: qantyx_user
      POSTGRES_PASSWORD: qantyx_password
      POSTGRES_DB: qantyx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: qantyx_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qantyx_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://qantyx_user:qantyx_password@db:5432/qantyx_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: qantyx_ai_engine
    ports:
      - "8001:8001"
    volumes:
      - ./ai-engine:/app

  vlsi-tools:
    build:
      context: ./vlsi-tools
      dockerfile: Dockerfile
    container_name: qantyx_vlsi_tools
    ports:
      - "8002:8002"
    volumes:
      - ./vlsi-tools:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qantyx_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
